---
comments: true
---
<!doctype html>
<html>
    <head>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=0.75"
        />
        <link type="text/css" rel="stylesheet" href="/main.css?version=1.1.1" />
        <title>kryscw: {{ page.title }}</title>
        <link rel="icon" type="image/x-icon" href="/images/icon.ico" />
        <meta name="description" content="im a game dev" />
    </head>

    <body>
        <!-- LINK BROWSER -->
        <div class="sticky_navbar">
            <header
            >
                <a href="/"
                    ><div class="wrapper">
                        <img
                            src="/images/krys_logo.png"
                            class="title_img"
                        /></div
                ></a>
                <div class="linkbrowser">
                    <ul class="linkbar">
                        <li>
                            <a
                                target="_blank"
                                href="https://www.youtube.com/@kryscw"
                                >YouTube</a
                            >
                        </li>
                        <li>
                            <a
                                href="/blog">
                                Blog</a
                            >
                        </li>
                        <li>
                            <a target="_blank" href="https://kryscw.itch.io/"
                                >Itch</a
                            >
                        </li>
                        <li>
                            <a target="_blank" href="https://github.com/kryscw"
                                >GitHub</a
                            >
                        </li>
                    </ul>
                </div>
            </header>
        </div>

        <!-- PAGE DATA BELOW -->

        <br/><br/>

        <div class="post" id="jekyllpost">
            <h1> {{ page.title }} </h1>
        	<h3>{{ page.description }}</h3>
        	<h3>{{ page.date | date: "%-d %B %Y" }}</h3>
        	<br/>
            <p class="jekyllPostText">
                {{ content }}
            </p>

            <br />
        </div>

        {% if page.comments %}
            <div id="disqus_thread"></div>
            <script>
                var disqus_config = function () {
                    //this.page.url = "https://kryscw.github.io";
                    this.page.identifier = '{{ page.url | absolute_url }}';
                };
                
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://kryscw.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        {% endif %}

        <br /><br />
        <br /><br />
    </body>
</html>
