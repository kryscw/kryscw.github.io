---
---
<!doctype html>
<html>
    <head>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=0.75"
        />
        <link type="text/css" rel="stylesheet" href="main.css?version=1.1.2" />
        <title>kryscw: Blog</title>
        <link rel="icon" type="image/x-icon" href="images/icon.ico" />
        <meta name="description" content="im a game dev" />
    </head>

    <body>
        <!-- LINK BROWSER -->
        <div class="sticky_navbar">
            <header
            >
                <a href="./"
                    ><div class="wrapper">
                        <img
                            src="images/krys_logo.png"
                            class="title_img"
                        /></div
                ></a>
                <div class="linkbrowser">
                    <ul class="linkbar">
                        <li>
                            <a
                                target="_blank"
                                href="https://www.youtube.com/@kryscw"
                                >YouTube</a
                            >
                        </li>
                        <li>
                            <a
                                href="blog">
                                Blog</a
                            >
                        </li>
                        <li>
                            <a target="_blank" href="https://kryscw.itch.io/"
                                >Itch</a
                            >
                        </li>
                        <li>
                            <a target="_blank" href="https://github.com/kryscw"
                                >GitHub</a
                            >
                        </li>
                    </ul>
                </div>
            </header>
        </div>
        <br/>

        <h3>Welcome to my Blog!</h3>

        <ul class="blogList">
          {% for post in site.posts %}
            <li>
                <a href="{{ post.url }}">
                    <div class="post">
                        <h4>{{ post.title }}</h4>
                        <h3>{{ post.date | date: "%-d %B %Y" }}</h3>
                        <h3>{{ post.description }}</h3>
                    </div>
                </a>
            </li>
          {% endfor %}
        </ul>

    </body>
</html>
